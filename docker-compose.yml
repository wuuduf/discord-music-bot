services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:latest
    restart: unless-stopped
    environment:
      LAVALINK_PASSWORD: ${LAVALINK_PASSWORD:-youshallnotpass}
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro

  discord-music-bot:
    build: .
    restart: unless-stopped
    depends_on:
      - lavalink
    env_file:
      - .env
    environment:
      STORAGE_PATH: /app/runtime/bot.sqlite
      AUDIO_BACKEND: ${AUDIO_BACKEND:-lavalink}
      LAVALINK_HOST: ${LAVALINK_HOST:-lavalink}
      LAVALINK_PORT: ${LAVALINK_PORT:-2333}
      LAVALINK_PASSWORD: ${LAVALINK_PASSWORD:-youshallnotpass}
      LAVALINK_SECURE: ${LAVALINK_SECURE:-false}
      LAVALINK_SEARCH_SOURCE: ${LAVALINK_SEARCH_SOURCE:-ytmsearch}
      LAVALINK_FALLBACK_SEARCH_SOURCE: ${LAVALINK_FALLBACK_SEARCH_SOURCE:-scsearch}
      YTDLP_ENABLED: ${YTDLP_ENABLED:-true}
      YTDLP_FALLBACK_MODE: ${YTDLP_FALLBACK_MODE:-direct}
      YTDLP_BIN: ${YTDLP_BIN:-yt-dlp}
      YTDLP_FORMAT: ${YTDLP_FORMAT:-bestaudio[ext=m4a]/bestaudio/best}
      YTDLP_TIMEOUT_MS: ${YTDLP_TIMEOUT_MS:-180000}
      YTDLP_CACHE_DIR: ${YTDLP_CACHE_DIR:-/app/runtime/cache}
      YTDLP_CACHE_PUBLIC_BASE_URL: ${YTDLP_CACHE_PUBLIC_BASE_URL:-http://discord-music-bot:3000}
      YTDLP_CACHE_HTTP_HOST: ${YTDLP_CACHE_HTTP_HOST:-0.0.0.0}
      YTDLP_CACHE_HTTP_PORT: ${YTDLP_CACHE_HTTP_PORT:-3000}
      YTDLP_CACHE_HTTP_TOKEN: ${YTDLP_CACHE_HTTP_TOKEN:-}
      YTDLP_CACHE_MAX_MB: ${YTDLP_CACHE_MAX_MB:-2048}
      YTDLP_CACHE_TTL_HOURS: ${YTDLP_CACHE_TTL_HOURS:-72}
      YTDLP_COOKIES_PATH: ${YTDLP_COOKIES_PATH:-}
      YTDLP_JS_RUNTIMES: ${YTDLP_JS_RUNTIMES:-node}
      YTDLP_EXTRACTOR_ARGS: ${YTDLP_EXTRACTOR_ARGS:-}
      YTDLP_REMOTE_COMPONENTS: ${YTDLP_REMOTE_COMPONENTS:-}
    volumes:
      - ./runtime:/app/runtime
